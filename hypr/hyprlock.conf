$wall = $HOME/.config/hypr/wallpapers/lock.png

# BACKGROUND
background {
    monitor =  DP-2
    path = $wall
    blur_passes = 0
    contrast = 0.8916
    brightness = 0.8916
    vibrancy = 0.8916
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# Profie-Photo
image {
    monitor = DP-2
    path = ~/user.png
    border_color = rgba(49, 50, 68,0.8)
    border_size = 2
    size = 100
    rounding = 0
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, 170
    halign = center
    valign = center
}

# NAME
label {
    monitor = DP-2
    text = $USER
    color = rgb(202, 211, 245)
    outline_thickness = 0
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    font_size = 20
    position = 0, 80
    halign = center
    valign = center
}

# Time
label {
    monitor = DP-2
    text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
    color = rgb(202, 211, 245)
    font_size = 60
    position = 0, -20
    halign = center
    valign = center
}

# Day-Month-Date
label {
    monitor = DP-2
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color = rgb(202, 211, 245)
    font_size = 19
    font_family = SF Pro Display Bold
    position = 0, -90
    halign = center
    valign = center
}

# Main-Box
shape {
    monitor = DP-2
    size = 500, 500
    color = rgba(24, 25, 38,0.62)
    border_color = rgba(49, 50, 68,0.8)
    border_size = 2
    rounding = 0
    rotate = 0
    xray = false 
    position = 0, -70
    halign = center
    valign = center
}

# USER-BOX
shape {
    monitor = DP-2
    size = 320, 55
    color = rgba(30, 32, 48,0.8)
    rounding = 0
    border_size = 2
    border_color = rgba(49, 50, 68,0.8)
    inner_color = rgba(30, 32, 48,0.8)
    rotate = 0
    xray = false # if true, make a "hole" in the background (rectangle of specified size, no rotation)
    position = 0, -190
    halign = center
    valign = center
}

# USER
label {
    monitor = DP-2
    text =     $USER
    color = rgb(202, 211, 245)
    outline_thickness = 0
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    font_size = 16
    position = 0, -190
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor = DP-2
    size = 320, 55
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    color = rgba(30, 32, 48,0.8)
    outer_color = rgba(49, 50, 68,0.8)
    inner_color = rgba(30, 32, 48,0.8)
    font_color = rgb(202, 211, 245)
    check_color = rgba(237, 135, 150,0.6)
    fail_color = rgba(237, 135, 150, 0.6)
    fade_on_empty = false
    placeholder_text = <i><span foreground="##cdd6f4ff">   Enter Pass</span></i>
    hide_input = false
    position = 0, -268
    halign = center
    valign = center
    rounding = 0

}
